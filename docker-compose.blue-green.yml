services:
  # ── Load balancer ───────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # upstream.conf is rewritten by deploy.sh to switch active slot
      - ./nginx/conf.d:/etc/nginx/conf.d:rw
    depends_on:
      app-blue:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Blue slot ───────────────────────────────────────────────────────────────
  app-blue:
    image: ${APP_IMAGE:-ghcr.io/linhcnh/linhcnh-finaltest-devops:latest}
    environment:
      ENVIRONMENT: production
      DEPLOYMENT_SLOT: blue
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Green slot ──────────────────────────────────────────────────────────────
  app-green:
    image: ${APP_IMAGE:-ghcr.io/linhcnh/linhcnh-finaltest-devops:latest}
    environment:
      ENVIRONMENT: production
      DEPLOYMENT_SLOT: green
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped
